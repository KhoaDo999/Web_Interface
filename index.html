<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cảnh báo tài xế - Lịch sử</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <img src="./logo/Logo_UTE.png" alt="logo trường" class="logo-left">
        <h1>Lịch Sử Phát Hiện Tài Xế Buồn Ngủ</h1>
        <h2>Warning History</h2>
        <button id="dark-mode-toggle" class="dark-toggle"> Dark Mode</button>
    </header>


    <!--  Dashboard Summary -->
    <section class="dashboard-summary">
        <div class="summary-card">
            <h3>Tổng cảnh báo hôm nay</h3>
            <p id="today-count">0</p>
        </div>
        <div class="summary-card">
            <h3>Lần cảnh báo gần nhất</h3>
            <p id="last-warning">--</p>
        </div>
        <div class="summary-card">
            <h3>Tổng cảnh báo trong tuần</h3>
            <p id="week-count">0</p>
        </div>
    </section>
    <div class="main">
        <!-- 🧾 Danh sách lịch sử -->
        <div class="content">
            <div id="alertList" class="alert-list">
                <p class="muted">Đang chờ dữ liệu cảnh báo...</p>
            </div>

            <div class="controls">
                <button id="clearBtn" class="clear-btn"> Xóa lịch sử</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <!-- Script chính -->
    <script src="script.js"></script>
</body>

</html>
